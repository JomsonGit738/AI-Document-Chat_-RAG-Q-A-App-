<div class="min-h-screen bg-[var(--bg-primary)] text-[var(--text-primary)]">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(99,102,241,0.16),transparent_28%),radial-gradient(circle_at_bottom_right,rgba(16,185,129,0.08),transparent_26%)]"></div>
    <div class="grid-overlay absolute inset-0 opacity-40"></div>
  </div>

  <div class="relative mx-auto flex min-h-screen max-w-[1600px] flex-col px-4 pb-4 pt-4 sm:px-6 lg:px-8">
    <header
      class="mb-4 flex items-center justify-between rounded-[28px] border border-[var(--border)] bg-[rgba(10,10,15,0.82)] px-5 py-4 shadow-[0_20px_60px_rgba(0,0,0,0.35)] backdrop-blur-xl"
    >
      <div class="flex items-center gap-3">
        <div
          class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[linear-gradient(135deg,var(--accent),#4f46e5)] text-sm font-semibold text-white shadow-[0_10px_24px_rgba(99,102,241,0.35)]"
        >
          D
        </div>
        <div>
          <p class="text-sm font-semibold tracking-[0.24em] text-[var(--text-muted)]">DOCCHAT</p>
          <h1 class="text-base font-semibold text-[var(--text-primary)]">AI Document Workspace</h1>
        </div>
      </div>

      <a
        href="https://github.com/"
        target="_blank"
        rel="noreferrer"
        aria-label="Open GitHub"
        class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-[var(--border)] bg-[var(--bg-card)] text-[var(--text-secondary)] transition hover:-translate-y-0.5 hover:border-[var(--accent)] hover:text-[var(--text-primary)]"
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          class="h-5 w-5 fill-current"
        >
          <path
            d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.31 6.84 9.66.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.46-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.94.85.09-.67.35-1.12.64-1.38-2.22-.26-4.56-1.14-4.56-5.09 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.27 2.75 1.05A9.36 9.36 0 0 1 12 6.84c.85 0 1.71.12 2.51.36 1.91-1.32 2.75-1.05 2.75-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.96-2.34 4.82-4.57 5.08.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.24 10.24 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"
          />
        </svg>
      </a>
    </header>

    <main class="flex flex-1 flex-col gap-4 lg:flex-row">
      <app-upload-panel
        class="block w-full lg:max-w-[340px] lg:flex-shrink-0"
        (questionSelected)="handleSuggestedQuestion($event)"
        (documentCleared)="handleDocumentCleared()"
      />

      <app-chat-panel class="block min-h-[720px] flex-1" />
    </main>
  </div>
</div>
