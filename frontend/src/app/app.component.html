<div class="h-screen overflow-hidden bg-[var(--bg-primary)] text-[var(--text-primary)]">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="grid-overlay absolute inset-0 opacity-40"></div>
  </div>

  <div class="relative mx-auto flex h-full max-w-[1600px] flex-col px-2 pb-4 pt-4 sm:px-3 lg:px-4">
    <main class="flex min-h-0 flex-1 flex-col gap-4 lg:flex-row">
      <app-upload-panel
        class="block min-h-0 w-full lg:max-w-[340px] lg:flex-shrink-0"
        (questionSelected)="handleSuggestedQuestion($event)"
        (documentCleared)="handleDocumentCleared()"
      />

      <app-chat-panel class="block min-h-0 flex-1" />
    </main>
  </div>
</div>
