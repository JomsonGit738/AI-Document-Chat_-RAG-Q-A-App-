<div class="workspace-shell text-[var(--text-primary)]">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="workspace-grain absolute inset-0"></div>
    <div class="workspace-lines absolute inset-y-0 left-[min(8vw,7rem)] hidden w-px lg:block"></div>
    <div class="workspace-lines absolute inset-y-0 right-[min(8vw,7rem)] hidden w-px lg:block"></div>
  </div>

  <div class="workspace-frame" [class.workspace-frame--condensed]="isHeaderCollapsible()">
    <div class="workspace-header-shell" [class.workspace-header-shell--condensed]="isHeaderCollapsible()">
      <div class="workspace-header-track" [class.workspace-header-track--condensed]="isHeaderCollapsible()">
        <header class="workspace-header">
          <div class="workspace-kicker">Research Console</div>
          <div class="workspace-title-group">
            <div class="workspace-brand">
              <span class="workspace-brand__mark" aria-hidden="true">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect width="100" height="100" rx="24" fill="#E8E0D0"/>
                  <path d="M28 16C28 13.7909 29.7909 12 32 12H57L74 29V72C74 74.2091 72.2091 76 70 76H32C29.7909 76 28 74.2091 28 72V16Z" fill="#2D5C3A"/>
                  <path d="M57 12L74 29H61C58.7909 29 57 27.2091 57 25V12Z" fill="#4A7C59"/>
                  <rect x="37" y="34" width="28" height="3.5" rx="1.75" fill="#F5F2EC"/>
                  <rect x="37" y="43" width="24" height="3.5" rx="1.75" fill="#F5F2EC"/>
                  <rect x="37" y="52" width="20" height="3.5" rx="1.75" fill="#F5F2EC"/>
                  <path d="M60 58C52.268 58 46 63.8203 46 71C46 74.0174 47.1077 76.7948 48.9648 79L47.5 87L54.5273 83.5938C56.2368 84.1883 58.0868 84.5 60 84.5H73C80.732 84.5 87 78.6797 87 71.5C87 64.3203 80.732 58.5 73 58.5H60V58Z" fill="#4A7C59"/>
                  <circle cx="58" cy="71" r="2.4" fill="#F5F2EC"/>
                  <circle cx="66" cy="71" r="2.4" fill="#F5F2EC"/>
                  <circle cx="74" cy="71" r="2.4" fill="#F5F2EC"/>
                </svg>
              </span>
              <h1 class="workspace-title">DocChat</h1>
            </div>
            <p class="workspace-subtitle">
              A document reading room for source-grounded summaries, questions, and citation-aware answers.
            </p>
          </div>
        </header>
      </div>
    </div>

    <main class="workspace-main">
      <section class="workspace-rail">
        <app-upload-panel
          class="block min-h-0 w-full"
          (questionSelected)="handleSuggestedQuestion($event)"
          (documentCleared)="handleDocumentCleared()"
        />
      </section>

      <section class="workspace-stage">
        <app-chat-panel class="block min-h-0 flex-1" />
      </section>
    </main>
  </div>
</div>
